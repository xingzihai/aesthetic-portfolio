<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>溶 · 萤火 | Melt × Firefly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <h1 class="demo-title">溶 · 萤火</h1>
    <p class="demo-desc">Melt × Firefly · 混合方案</p>
    
    <!-- 主头像容器 -->
    <div class="avatar-wrapper">
      <div class="avatar-container" id="avatar">
        <!-- 氛围光晕 -->
        <div class="aura-glow"></div>
        
        <!-- 萤火粒子层 -->
        <div class="fireflies-layer">
          <!-- 萤火粒子将由JS生成 -->
        </div>
        
        <!-- 核心结构：溶 -->
        <div class="melt-structure">
          <!-- 连接线 -->
          <div class="connect-lines">
            <span class="line line-top-left"></span>
            <span class="line line-top-right"></span>
            <span class="line line-bottom-left"></span>
            <span class="line line-bottom-right"></span>
          </div>
          
          <!-- 四个圆形 -->
          <div class="circle circle-top" data-name="ice"></div>
          <div class="circle circle-left" data-name="water"></div>
          <div class="circle circle-right" data-name="water"></div>
          <div class="circle circle-bottom" data-name="melt"></div>
        </div>
        
        <!-- 涟漪层（点击产生） -->
        <div class="ripples-layer"></div>
      </div>
    </div>
    
    <div class="demo-instructions">
      <p>移动鼠标：粒子躲避 + 圆形融化</p>
      <p>点击头像：涟漪扩散</p>
    </div>
  </div>
  
  <script src="main.js"></script>
</body>
</html>
